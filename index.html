<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Todo App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-container">
    <header>
      <h1>Tasks.</h1>
      <p class="subtitle">Stay organized, stay creative.</p>
    </header>
    
    <form id="todo-form">
      <div class="input-wrapper">
        <input type="text" id="todo-input" placeholder="What needs to be done?" autocomplete="off">
        <button type="submit" id="add-btn" aria-label="Add task">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list">
      <!-- Todos injected here -->
    </ul>
    
    <div class="empty-state" id="empty-state">
      <p>No tasks found. Take a break!</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
